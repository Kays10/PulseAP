version: '3.8'

services:
  backend:
    build: ./backend
    container_name: pulseap-backend
    volumes:
      - ./backend:/app
      - vpn-configs:/etc/vpn-configs
    env_file:
      - .env
    privileged: true # Required for VPN subprocesses to manage network interfaces
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    ports:
      - "8000:8000"
    restart: always

  frontend:
    build: ./frontend
    container_name: pulseap-frontend
    ports:
      - "80:80"
    environment:
      - REACT_APP_API_URL=http://localhost:8000/api
    depends_on:
      - backend
    restart: always

volumes:
  vpn-configs:
